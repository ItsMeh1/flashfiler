<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Filer</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0e1118; color: #ffffff;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* INITIAL UPLOAD SCREEN */
        #upload-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .upload-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 16px 40px; border-radius: 12px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .upload-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: #10b981; }
        input[type="file"] { display: none; }

        /* MAIN VIEWER CONTAINER */
        #viewer-container {
            display: none; width: 100%; height: 100%; position: relative;
        }
        #content-area {
            width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000;
        }

        /* ORIGINAL FLOATING HOVER CONTROL BAR */
        #bottom-overlay {
            position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000;
        }
        #viewer-container:hover #bottom-overlay { bottom: 24px; }
        
        .overlay-btn {
            background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s;
        }
        .overlay-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .overlay-btn.exit { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); color: #f87171; }
        .overlay-btn.exit:hover { background: #ef4444; color: white; }
        #file-name { font-weight: 500; font-size: 13px; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #94a3b8; }

        /* DYNAMIC AUDIO EXTRAS (Only shows when playing audio) */
        #spotify-queue-panel {
            display: none; position: absolute; right: 24px; top: 24px; width: 260px; max-height: 300px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 16px; box-sizing: border-box; overflow-y: auto; z-index: 999;
        }
        .queue-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #10b981; margin-bottom: 10px; }
        .queue-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
        .queue-item { font-size: 13px; color: #cbd5e1; padding: 6px; border-radius: 4px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-item:hover { background: rgba(255,255,255,0.05); }
        .queue-item.active-track { color: #10b981; font-weight: bold; background: rgba(16, 185, 129, 0.1); }

        #spotify-bottom-bar {
            display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #070a13; border-top: 1px solid rgba(255,255,255,0.05); align-items: center;
            justify-content: center; padding: 0 20px; box-sizing: border-box; z-index: 998;
        }
        .audio-mount-point { width: 100%; max-width: 500px; }

        /* FLOATING CLI TERMINAL WINDOW */
        #floating-cli {
            display: none; position: absolute; left: 24px; bottom: 90px; width: 360px; height: 200px;
            background: rgba(5, 5, 10, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; flex-direction: column; overflow: hidden; font-family: monospace; z-index: 2000;
        }
        .cli-stream { flex: 1; padding: 12px; overflow-y: auto; font-size: 12px; color: #10b981; display: flex; flex-direction: column; gap: 4px; }
        .cli-row { display: flex; background: #000; padding: 6px 12px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .cli-input { flex: 1; background: none; border: none; outline: none; color: white; font-family: inherit; font-size: 12px; margin-left: 6px; }

        /* ORIGINAL INFORMATION PANEL EXTENSION */
        #info-grid {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            background: rgba(15, 23, 42, 0.8); border-radius: 8px; margin-top: 10px; padding: 0 10px;
        }
        #info-grid.expanded { max-height: 200px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; color: #94a3b8; }

        /* FORMAT TARGETS */
        .plyr-video-container { width: 80%; max-height: 80%; border-radius: 12px; overflow: hidden; }
        .premium-image { max-width: 85%; max-height: 85%; border-radius: 8px; object-fit: contain; }
        .app-workspace-iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div id="upload-screen">
        <label for="file-input" class="upload-btn">Import File(s)</label>
        <input type="file" id="file-input" accept="image/*,video/*,audio/*,.html" multiple>
    </div>

    <div id="viewer-container">
        
        <div id="content-area"></div>

        <div id="spotify-queue-panel">
            <div class="queue-title">Up Next</div>
            <ul class="queue-list" id="queue-target"></ul>
        </div>

        <div id="floating-cli">
            <div class="cli-stream" id="cli-stream">
                <div>Flash OS Shell Console v2.1</div>
                <div style="color:#64748b">Logs and error catch arrays will report here.</div>
            </div>
            <div class="cli-row">
                <span>$</span>
                <input type="text" class="cli-input" id="cli-field" placeholder="Enter command...">
            </div>
        </div>

        <div id="spotify-bottom-bar">
            <div class="audio-mount-point" id="audio-mount"></div>
        </div>

        <div id="bottom-overlay">
            <span id="file-name">Target Node</span>
            <button class="overlay-btn" id="info-btn">Info</button>
            <button class="overlay-btn" id="refresh-btn" style="display:none;">Refresh</button>
            <button class="overlay-btn" id="cli-btn">Terminal</button>
            <button class="overlay-btn exit" id="close-btn">Close Sandbox</button>
            
            <div id="info-grid">
                <div class="info-row"><span>Environment:</span><span id="info-env">Native DOM</span></div>
                <div class="info-row"><span>Type Asset:</span><span id="info-type">-</span></div>
            </div>
        </div>

    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadScreen = document.getElementById('upload-screen');
        const viewerContainer = document.getElementById('viewer-container');
        const contentArea = document.getElementById('content-area');
        const closeBtn = document.getElementById('close-btn');
        const fileNameDisplay = document.getElementById('file-name');
        
        const infoBtn = document.getElementById('info-btn');
        const infoGrid = document.getElementById('info-grid');
        const infoEnv = document.getElementById('info-env');
        const infoType = document.getElementById('info-type');
        
        const refreshBtn = document.getElementById('refresh-btn');
        const cliBtn = document.getElementById('cli-btn');
        const floatingCli = document.getElementById('floating-cli');
        const cliField = document.getElementById('cli-field');
        const cliStream = document.getElementById('cli-stream');

        const spotifyQueuePanel = document.getElementById('spotify-queue-panel');
        const spotifyBottomBar = document.getElementById('spotify-bottom-bar');
        const queueTarget = document.getElementById('queue-target');
        const audioMount = document.getElementById('audio-mount');

        let plyrVideoInstance = null;
        let plyrAudioInstance = null;
        let playlistTracks = [];
        let activeTrackIndex = -1;
        let activeHtmlRaw = "";

        // Toggle UI Panels
        infoBtn.addEventListener('click', () => infoGrid.classList.toggle('expanded'));
        cliBtn.addEventListener('click', () => {
            floatingCli.style.display = floatingCli.style.display === 'flex' ? 'none' : 'flex';
        });

        // Safe Error Pipeline Log Receiver
        window.addEventListener('message', function(e) {
            if (e.data && e.data.source === 'sandbox-logger') {
                printLogMessage(e.data.text, e.data.type);
            }
        });

        function printLogMessage(msg, type = 'log') {
            const row = document.createElement('div');
            row.style.color = type === 'error' ? '#ff6b6b' : type === 'warn' ? '#fcca46' : '#10b981';
            row.textContent = `[${type.toUpperCase()}] ${msg}`;
            cliStream.appendChild(row);
            cliStream.scrollTop = cliStream.scrollHeight;
        }

        // Process File Drop
        fileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            uploadScreen.style.display = 'none';
            viewerContainer.style.display = 'block';

            const audios = files.filter(f => f.type.startsWith('audio/'));

            if (audios.length > 0) {
                // RUNNING SPOTIFY AUDIO LOADOUT
                spotifyQueuePanel.style.display = 'block';
                spotifyBottomBar.style.display = 'flex';
                refreshBtn.style.display = 'none';
                infoEnv.textContent = "Spotify Audio Engine";
                infoType.textContent = "Audio/MP3 Queue";

                const startIdx = playlistTracks.length;
                audios.forEach(file => {
                    playlistTracks.push({ name: file.name, url: URL.createObjectURL(file) });
                });
                renderQueueUi();
                if (activeTrackIndex === -1) playTrack(startIdx);
            } else {
                // RUNNING STANDARD MEDIA/HTML
                spotifyQueuePanel.style.display = 'none';
                spotifyBottomBar.style.display = 'none';
                buildSingleAssetView(files[0]);
            }
        });

        function buildSingleAssetView(file) {
            cleanViewers();
            fileNameDisplay.textContent = file.name;
            infoType.textContent = file.type || "Unknown Document";
            const url = URL.createObjectURL(file);

            if (file.type.startsWith('image/')) {
                infoEnv.textContent = "Native Pipeline";
                refreshBtn.style.display = 'none';
                const img = document.createElement('img');
                img.src = url; img.className = 'premium-image';
                contentArea.appendChild(img);

            } else if (file.type.startsWith('video/')) {
                infoEnv.textContent = "Plyr Video Engine";
                refreshBtn.style.display = 'none';
                const container = document.createElement('div');
                container.className = 'plyr-video-container';
                container.innerHTML = `<video id="video-core" src="${url}" controls playsinline></video>`;
                contentArea.appendChild(container);
                plyrVideoInstance = new Plyr('#video-core');

            } else if (file.type === 'text/html' || file.name.endsWith('.html')) {
                infoEnv.textContent = "Isolated Sandbox Frame";
                refreshBtn.style.display = 'inline-block';
                const reader = new FileReader();
                reader.onload = function(evt) {
                    activeHtmlRaw = evt.target.result;
                    bootIframeSandbox(activeHtmlRaw);
                };
                reader.readAsText(file);
            }
        }

        function bootIframeSandbox(html) {
            const oldFrame = contentArea.querySelector('iframe');
            if (oldFrame) oldFrame.remove();

            const iframe = document.createElement('iframe');
            iframe.className = 'app-workspace-iframe';
            
            // Text-broken tokens protect the main script from crashing out
            const startTag = '<sc' + 'ript>';
            const endTag = '</sc' + 'ript>';

            const scriptInterceptor = startTag + `
                window.onerror = function(msg, url, line) {
                    window.parent.postMessage({source: 'sandbox-logger', type: 'error', text: msg + ' (Line ' + line + ')'}, '*');
                    return false;
                };
                ['log','warn','error'].forEach(type => {
                    const orig = console[type];
                    console[type] = function(...args) {
                        window.parent.postMessage({source: 'sandbox-logger', type: type, text: args.join(' ')}, '*');
                        orig.apply(console, args);
                    };
                });
            ` + endTag;

            iframe.srcdoc = scriptInterceptor + html;
            contentArea.appendChild(iframe);
            printLogMessage("Sandbox frame environment booted successfully.");
        }

        // Action Buttons
        refreshBtn.addEventListener('click', () => {
            if (activeHtmlRaw) {
                printLogMessage("Forcing runtime compilation refresh...", "warn");
                bootIframeSandbox(activeHtmlRaw);
            }
        });

        // Audio Playlist Execution
        function renderQueueUi() {
            queueTarget.innerHTML = '';
            playlistTracks.forEach((track, i) => {
                const li = document.createElement('li');
                li.className = `queue-item ${i === activeTrackIndex ? 'active-track' : ''}`;
                li.textContent = `${i + 1}. ${track.name}`;
                li.onclick = () => playTrack(i);
                queueTarget.appendChild(li);
            });
        }

        function playTrack(i) {
            if (i < 0 || i >= playlistTracks.length) return;
            activeTrackIndex = i;
            renderQueueUi();

            const track = playlistTracks[i];
            fileNameDisplay.textContent = track.name;

            if (plyrAudioInstance) { plyrAudioInstance.destroy(); plyrAudioInstance = null; }
            audioMount.innerHTML = `<audio id="audio-core" src="${track.url}" controls></audio>`;

            plyrAudioInstance = new Plyr('#audio-core', { controls: ['play', 'progress', 'current-time', 'duration', 'mute', 'volume'] });
            plyrAudioInstance.play();

            plyrAudioInstance.on('ended', () => {
                if (activeTrackIndex + 1 < playlistTracks.length) playTrack(activeTrackIndex + 1);
            });
        }

        function cleanViewers() {
            contentArea.innerHTML = '';
            if (plyrVideoInstance) { plyrVideoInstance.destroy(); plyrVideoInstance = null; }
        }

        closeBtn.addEventListener('click', () => {
            cleanViewers();
            if (plyrAudioInstance) { plyrAudioInstance.destroy(); plyrAudioInstance = null; audioMount.innerHTML = ''; }
            playlistTracks.forEach(t => URL.revokeObjectURL(t.url));
            
            playlistTracks = []; activeTrackIndex = -1; activeHtmlRaw = "";
            fileNameDisplay.textContent = "Target Node";
            
            spotifyQueuePanel.style.display = 'none';
            spotifyBottomBar.style.display = 'none';
            floatingCli.style.display = 'none';
            infoGrid.classList.remove('expanded');
            
            viewerContainer.style.display = 'none';
            uploadScreen.style.display = 'flex';
            fileInput.value = '';
            cliStream.innerHTML = '<div>Console cleared. Waiting for next connection...</div>';
        });

        // CLI Shell Engine
        cliField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const input = this.value.trim();
                if (!input) return;

                const userRow = document.createElement('div');
                userRow.style.color = '#ffffff'; userRow.textContent = `$ ${input}`;
                cliStream.appendChild(userRow);

                const cmd = input.toLowerCase();
                if (cmd === 'clear') {
                    cliStream.innerHTML = '';
                } else if (cmd === 'refresh' || cmd === 'reload') {
                    if (activeHtmlRaw) bootIframeSandbox(activeHtmlRaw);
                    else printLogMessage("No active script frame context available.", "error");
                } else if (cmd === 'help') {
                    printLogMessage("System overrides: clear, refresh, help");
                } else {
                    printLogMessage(`Command execution notice: parsed '${cmd}'`);
                }

                this.value = '';
                cliStream.scrollTop = cliStream.scrollHeight;
            }
        });
    </script>
</body>
</html>
